<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fridge Chef | Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-page">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="glass-card auth-card p-4 p-md-5">
            <div class="text-center mb-4">
              <a href="index.html" class="navbar-brand fw-bold fs-3 text-decoration-none"><i class="bi bi-basket2-fill me-2"></i>Fridge Chef</a>
              <p class="text-muted mt-2">Welcome back! Sign in to continue cooking smart.</p>
            </div>
            <div id="formMessage" class="alert d-none" role="status"></div>
            <form id="signinForm" action="/signin" method="post" novalidate>
              <div class="mb-3">
                <label class="form-label" for="signinEmail">Email address</label>
                <input id="signinEmail" name="email" type="email" class="form-control" placeholder="you@example.com" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="signinPassword">Password</label>
                <input id="signinPassword" name="password" type="password" class="form-control" placeholder="Enter your password" required />
              </div>
              <button class="btn btn-primary w-100 py-2" type="submit">Sign In</button>
            </form>
            <div class="text-center mt-3">
              <span class="text-muted">New here?</span>
              <a href="signup.html" class="ms-1 text-success fw-semibold">Create an account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
